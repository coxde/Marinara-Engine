plugins {
    id 'com.android.application'
}

def marinaraPort = (project.findProperty("marinaraPort") ?: "7860").toString()

android {
    namespace 'com.marinara.engine'
    compileSdk 34

    defaultConfig {
        applicationId "com.marinara.engine"
        minSdk 24
        targetSdk 34
        versionCode 2
        versionName "1.4.6"
        buildConfigField "String", "MARINARA_SERVER_URL", "\"http://localhost:${marinaraPort}\""
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt')
        }
        debug {
            debuggable true
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
